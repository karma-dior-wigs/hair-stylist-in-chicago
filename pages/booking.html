<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Karma Dior · Booking</title>
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
  <div class="app-shell">

    <aside class="sidebar">
      <div class="brand-row">
        <div class="brand-mark">KD</div>
        <div>
          <div class="brand-name">Karma Dior</div>
          <div class="brand-tagline">Hair Stylist · Chicago</div>
        </div>
      </div>

      <nav class="nav-links">
        <a class="nav-link" href="../index.html">Home</a>
        <a class="nav-link" href="process.html">Process</a>
        <a class="nav-link active" href="booking.html">Booking</a>
        <a class="nav-link" href="faq.html">FAQ</a>
      </nav>
    </aside>

    <main class="main">
      <h1 class="section-title">Book an Appointment</h1>

      <form class="card gold">
        <div class="form-field">
          <label>Name</label>
          <input type="text" placeholder="Your name">
        </div>

        <div class="form-field">
          <label>Email</label>
          <input type="email" placeholder="Your email">
        </div>

        <div class="form-field">
          <label>Service</label>
          <select>
            <option>Silk Press</option>
            <option>Color</option>
            <option>Extensions</option>
            <option>Treatment</option>
          </select>
        </div>

        <div class="form-field">
          <label>Notes</label>
          <textarea rows="4" placeholder="Anything you'd like me to know"></textarea>
        </div>

        <button class="primary">Submit</button>
      </form>
    </main>

  </div>

  <script src="../js/main.js"></script>
</body>
</html>
